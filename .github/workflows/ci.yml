name: ci

on:
  push:
    branches: [master]
  pull_request:

# Lightweight, reliable gate: byte-compile every source file to catch syntax errors.
# (No heavy install, no secrets, no LLM calls — the full retrieval/RAGAS/routing evals
# run locally, since they need the models, Qdrant, and a Groq key.)
jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Byte-compile all source
        run: python -m compileall agent api ui retrieval ingestion evals config.py app.py
